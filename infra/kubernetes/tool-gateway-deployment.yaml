apiVersion: apps/v1
kind: Deployment
metadata:
  name: tool-gateway
  namespace: pamasmma
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tool-gateway
  template:
    metadata:
      labels:
        app: tool-gateway
    spec:
      containers:
      - name: tool-gateway
        image: pamasmma/tool-gateway:latest
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        envFrom:
        - configMapRef:
            name: pamasmma-config
        - secretRef:
            name: pamasmma-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
