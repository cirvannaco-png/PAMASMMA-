apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-agent
  namespace: pamasmma
spec:
  replicas: 2
  selector:
    matchLabels:
      app: content-agent
  template:
    metadata:
      labels:
        app: content-agent
    spec:
      containers:
      - name: content-agent
        image: pamasmma/content-agent:latest
        ports:
        - containerPort: 3002
        env:
        - name: PORT
          value: "3002"
        envFrom:
        - configMapRef:
            name: pamasmma-config
        - secretRef:
            name: pamasmma-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
